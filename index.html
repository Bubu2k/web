<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yêu Vy - Forever</title>
    <style>
        /* Toàn bộ thiết lập nền tảng */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d0208; /* Nền tối sâu tạo độ ngầu */
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Canvas hiệu ứng các hạt phía sau */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Khung nội dung chính - Phong cách Glassmorphism chuyên nghiệp */
        .card {
            background: rgba(255, 20, 147, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 20, 147, 0.2);
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            z-index: 2;
            box-shadow: 0 0 40px rgba(255, 20, 147, 0.15),
                        inset 0 0 20px rgba(255, 20, 147, 0.05);
            animation: fadeIn 1.5s ease-out;
        }

        /* Hiệu ứng chữ Neon Hồng Cyberpunk cực ngầu */
        h1 {
            font-size: 3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 
                0 0 7px #ff1493,
                0 0 10px #ff1493,
                0 0 21px #ff1493,
                0 0 42px #ff69b4,
                0 0 82px #ff69b4;
            margin-bottom: 0.5rem;
            animation: pulse 2s infinite alternate;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #ffb6c1;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            font-weight: 300;
            text-transform: uppercase;
        }

        /* Trái tim 3D phát sáng lãng mạn */
        .heart-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
        }

        .heart {
            background-color: #ff1493;
            display: inline-block;
            height: 50px;
            position: relative;
            top: 25px;
            transform: rotate(-45deg);
            width: 50px;
            box-shadow: 0 0 30px #ff1493;
            animation: beat 0.8s infinite alternate;
        }

        .heart:before,
        .heart:after {
            content: "";
            background-color: #ff1493;
            border-radius: 50%;
            height: 50px;
            position: absolute;
            width: 50px;
        }

        .heart:before {
            top: -25px;
            left: 0;
        }

        .heart:after {
            left: 25px;
            top: 0;
        }

        /* Nút tương tác chuyên nghiệp */
        .btn {
            background: transparent;
            border: 2px solid #ff1493;
            color: #fff;
            padding: 12px 35px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            outline: none;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: #ff1493;
            box-shadow: 0 0 25px #ff1493;
            text-shadow: 0 0 5px #fff;
        }

        /* Lời nhắn ẩn */
        .message {
            margin-top: 1.5rem;
            font-size: 1rem;
            color: #ffb6c1;
            font-style: italic;
            opacity: 0;
            height: 0;
            transition: all 0.5s ease;
            line-height: 1.6;
        }

        .message.show {
            opacity: 1;
            height: auto;
            margin-top: 1.5rem;
        }

        /* Các hiệu ứng Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes beat {
            0% { transform: scale(1) rotate(-45deg); }
            100% { transform: scale(1.15) rotate(-45deg); box-shadow: 0 0 40px #ff69b4; }
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 4px #ff1493, 0 0 10px #ff1493, 0 0 40px #ff69b4; }
            100% { text-shadow: 0 0 8px #ff1493, 0 0 20px #ff1493, 0 0 60px #ff69b4; }
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="card">
        <div class="heart-container">
            <div class="heart"></div>
        </div>
        <h1>Yêu Vy</h1>
        <div class="subtitle">Chỉ riêng mình em</div>
        
        <button class="btn" onclick="revealMessage()">Khám phá bí mật</button>
        
        <div class="message" id="secretMessage">
            "Trong thế giới hàng tỷ người, anh chỉ hướng về một người duy nhất. Gặp được Vy là điều tuyệt vời nhất trong cuộc đời anh. Cảm ơn em vì đã xuất hiện!"
        </div>
    </div>

    <script>
        // Xử lý hiệu ứng hạt (Particles) bay lãng mạn
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        let particlesArray = [];
        const numberOfParticles = 60;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * -1 - 0.2; // Bay lên trên nhẹ nhàng
                this.color = `rgba(255, ${Math.floor(Math.random() * 100) + 20}, 147, ${Math.random() * 0.5 + 0.2})`;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Nếu bay hết màn hình thì xuất hiện lại ở dưới
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
                if (this.x > canvas.width || this.x < 0) {
                    this.speedX = -this.speedX;
                }
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();

        // Hàm click hiện lời nhắn lãng mạn
        function revealMessage() {
            const msg = document.getElementById('secretMessage');
            const btn = document.querySelector('.btn');
            
            msg.classList.toggle('show');
            
            if (msg.classList.contains('show')) {
                btn.textContent = "Đóng lại";
                // Tạo hiệu ứng nổ tim nhỏ khi click
                createHeartBurst();
            } else {
                btn.textContent = "Khám phá bí mật";
            }
        }

        // Hiệu ứng nổ tim nhẹ tăng phần tinh tế
        function createHeartBurst() {
            for(let i=0; i<10; i++) {
                const burst = document.createElement('div');
                burst.style.position = 'absolute';
                burst.style.width = '10px';
                burst.style.height = '10px';
                burst.style.backgroundColor = '#ff69b4';
                burst.style.transform = 'rotate(45deg)';
                burst.style.left = '50%';
                burst.style.top = '40%';
                burst.style.borderRadius = '2px';
                burst.style.transition = 'all 0.8s ease-out';
                burst.style.zIndex = '3';
                
                document.body.appendChild(burst);
                
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 150 + 50;
                
                setTimeout(() => {
                    burst.style.transform = `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px) rotate(45deg)`;
                    burst.style.opacity = '0';
                }, 10);
                
                setTimeout(() => { burst.remove(); }, 800);
            }
        }
    </script>
</body>
</html>
